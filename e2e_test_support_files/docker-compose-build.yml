version: "3.7"

services:
  gateway:
    build:
      context: ../gateway
    container_name: gateway
    restart: "unless-stopped"
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"

  frontend:
    build:
      context: ../frontend
    container_name: frontend
    restart: "unless-stopped"
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS:
      SPA_DEFAULT_LOCALE:
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      timeout: 5s
    depends_on:
      - backend

  backend:
    build:
      context: ../
    container_name: backend
    depends_on:
      - db
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "true"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: ${OPENMRS_DB_USER:-openmrs}
      OMRS_CONFIG_CONNECTION_PASSWORD: ${OPENMRS_DB_PASSWORD:-openmrs}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/openmrs" ]
      timeout: 5s

  # MariaDB
  db:
    image: mariadb:10.8.2
    container_name: db
    command: "mysqld --character-set-server=utf8 --collation-server=utf8_general_ci --datadir=/openmrs-db"
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: ${OPENMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${OPENMRS_DB_PASSWORD:-openmrs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-openmrs}

  # MySQL Master
  -master:
    # We'll use the latest MySQL image from Docker Hub
    image: mysql:8.0.40
    # Give it a cool name (mysql-master is pretty clear, right?)
    container_name: openmrs_prod
    # Extra commands to configure the master for replication
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=row
    # Set some environment variables for passwords and database details
    # Remember to replace these with your own strong passwords!
    environment:
      MYSQL_ROOT_PASSWORD: contra123
      MYSQL_DATABASE: openmrs_db # Feel free to change this database name
      MYSQL_USER: openmrs # This user will handle replication
      MYSQL_PASSWORD: dev123
    # Map the container port (3306) to your host machine's port (also 3306)
    # This lets you access the master server from your machine
    ports:
      - "3306:3306"

  # MySQL Slave
  db-slave:
    # Same image as the master
    image: mysql:8.0.40
    # Another cool name (can you guess what it is?)
    container_name: openmrs_prod_repl
    # This tells the replica to wait for the master to be ready before starting
    depends_on:
      - openmrs-master
    # Similar commands and environment variables as the master
    command: --server-id=2 --log-bin=mysql-bin --binlog-format=row
    environment:
      MYSQL_ROOT_PASSWORD: contra123 # Same password for both
      MYSQL_DATABASE: openmrs_db
      MYSQL_USER: openmrs
      MYSQL_PASSWORD: dev123
    # Map the container port (3306) to a different host machine port (3307 in this case)
    ports:
      - "3307:3306"

