# OAuth 2.0 Provider Configuration  
oauth2.clientId=openmrs
oauth2.clientSecret=openmrs-secret-change-in-production

# Keycloak URLs - usando nombres de servicio Docker
oauth2.authorizationUrl=http://keycloak:8080/realms/openmrs/protocol/openid-connect/auth
oauth2.accessTokenUrl=http://keycloak:8080/realms/openmrs/protocol/openid-connect/token
oauth2.userInfoUrl=http://keycloak:8080/realms/openmrs/protocol/openid-connect/userinfo
oauth2.logoutUrl=http://keycloak:8080/realms/openmrs/protocol/openid-connect/logout

# JWT Configuration
oauth2.keysUrl=http://keycloak:8080/realms/openmrs/protocol/openid-connect/certs

# User Mapping Configuration
oauth2.mapping.user.username=preferred_username
oauth2.mapping.user.givenName=given_name
oauth2.mapping.user.familyName=family_name
oauth2.mapping.user.email=email

# Role Mapping
oauth2.mapping.role.roleAttributeName=roles

# OAuth2 Login Configuration
oauth2login.loginWithOAuth2=true
oauth2login.logoutUri=/openmrs/logout
oauth2login.redirectUriAfterLogin=/openmrs/spa