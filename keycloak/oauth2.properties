# OAuth 2.0 Configuration for Keycloak SSO

# OAuth 2.0 provider URLs
oauth2.authorization.url=http://localhost:8081/realms/openmrs/protocol/openid-connect/auth
oauth2.token.url=http://localhost:8081/realms/openmrs/protocol/openid-connect/token
oauth2.user.info.url=http://localhost:8081/realms/openmrs/protocol/openid-connect/userinfo
oauth2.logout.url=http://localhost:8081/realms/openmrs/protocol/openid-connect/logout

# Client credentials
oauth2.client.id=openmrs
oauth2.client.secret=openmrs-secret
oauth2.scope=openid profile email

# User attribute mappings
oauth2.user.mapping.username=preferred_username
oauth2.user.mapping.systemId=sub
oauth2.user.mapping.email=email
oauth2.user.mapping.givenName=given_name
oauth2.user.mapping.familyName=family_name
oauth2.user.mapping.roles=roles

# OAuth 2.0 settings
oauth2.redirect.uri=http://localhost:8080/openmrs/oauth2/callback
oauth2.post.logout.redirect.uri=http://localhost:8080/openmrs/login.htm

# Enable user creation on first login
oauth2.user.create=true

# Custom logout URL after successful logout
oauth2.custom.logout.url=http://localhost:8081/realms/openmrs/protocol/openid-connect/logout?redirect_uri=http://localhost:8080/openmrs/login.htm